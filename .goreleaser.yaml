version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ptagent
    main: ./cmd/ptagent
    binary: ptagent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=false
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mtzanidakis/portfolio-tracker/internal/version.Version={{.Version}}

archives:
  - id: ptagent
    ids:
      - ptagent
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - skill/SKILL.md
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

release:
  draft: false

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore\\(deps\\):"
