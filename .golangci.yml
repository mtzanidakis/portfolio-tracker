version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - gocritic
          - unparam

formatters:
  enable:
    - gofumpt
    - goimports
